<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0A1F5C" />

    <!-- Primary SEO -->
    <title>
      Terratrail — Land Sales Operations Platform for Nigerian Real Estate
    </title>
    <meta
      name="description"
      content="Terratrail shows you exactly where money is coming in, which customers are falling behind, and which plots are still available — without opening a single spreadsheet."
    />
    <meta
      name="keywords"
      content="land sales software, real estate operations, Nigeria property management, installment tracking, estate management software, realtor commission tracking, subscription management"
    />
    <meta name="author" content="Terratrail" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://terratrail.app/" />

    <!-- Icons -->
    <link rel="icon" type="image/png" href="/icon-logo-white.png" />
    <link rel="apple-touch-icon" href="/icon-logo-white.png" />

    <!-- Open Graph / Facebook / WhatsApp / LinkedIn link previews -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Terratrail" />
    <meta property="og:url" content="https://terratrail.app/" />
    <meta
      property="og:title"
      content="Terratrail — The operations stack your land sales business actually needs"
    />
    <meta
      property="og:description"
      content="See exactly where money is coming in, which customers are falling behind, and which plots are still available — without opening a single spreadsheet."
    />
    <meta property="og:image" content="https://terratrail.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="Terratrail — Land Sales Operations Platform"
    />
    <meta property="og:locale" content="en_NG" />

    <!-- Twitter / X link previews -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Terratrail — Land Sales Operations Platform"
    />
    <meta
      name="twitter:description"
      content="See exactly where money is coming in, which customers are falling behind, and which plots are still available — without opening a single spreadsheet."
    />
    <meta name="twitter:image" content="https://terratrail.app/og-image.png" />

    <!-- Structured data for rich search results -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Terratrail",
        "applicationCategory": "BusinessApplication",
        "operatingSystem": "Web",
        "description": "Operations platform for Nigerian land sales companies — manage properties, track installment subscriptions, automate payment reminders, run a realtor network and give customers a self-service portal.",
        "url": "https://terratrail.app/",
        "image": "https://terratrail.app/logo.png",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "NGN"
        },
        "publisher": {
          "@type": "Organization",
          "name": "Terratrail",
          "logo": "https://terratrail.app/logo.png"
        }
      }
    </script>

    <!-- Fonts: only what the UI actually uses (Inter, Space Grotesk, Material Icons Round) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons+Round"
      rel="stylesheet"
    />

    <!-- Preloader styles (inline so it paints before any JS/CSS bundle loads) -->
    <style>
      #app-preloader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 22px;
        background: #ffffff;
        transition:
          opacity 0.45s ease,
          visibility 0.45s ease;
      }
      #app-preloader.is-hidden {
        opacity: 0;
        visibility: hidden;
      }
      #app-preloader img {
        width: 64px;
        height: 64px;
        object-fit: contain;
        animation: preloader-pulse 1.6s ease-in-out infinite;
      }
      #app-preloader .preloader-bar {
        width: 140px;
        height: 4px;
        border-radius: 999px;
        background: #e2e8f0;
        overflow: hidden;
      }
      #app-preloader .preloader-bar span {
        display: block;
        width: 40%;
        height: 100%;
        border-radius: 999px;
        background: linear-gradient(90deg, #1d4ed8, #60a5fa);
        animation: preloader-slide 1.1s ease-in-out infinite;
      }
      @keyframes preloader-pulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(0.92);
          opacity: 0.6;
        }
      }
      @keyframes preloader-slide {
        0% {
          transform: translateX(-120%);
        }
        100% {
          transform: translateX(360%);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        #app-preloader img,
        #app-preloader .preloader-bar span {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <!-- Preloader: removed by main.tsx once React has mounted -->
    <div id="app-preloader" aria-hidden="true">
      <img src="/icon-logo.png" alt="Terratrail" />
      <div class="preloader-bar"><span></span></div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
